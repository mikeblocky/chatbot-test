name: Daily document sync

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: docker build -t lumen-drift-731 .
      - run: docker run --rm -e API_KEY -v "$PWD/artifacts:/app/artifacts" lumen-drift-731 | tee run.log
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - run: cat artifacts/last-run.json >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: last-run
          path: |
            artifacts/last-run.json
            run.log
