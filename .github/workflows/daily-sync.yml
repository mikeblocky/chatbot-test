name: Daily document sync

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python main.py | tee run.log
        env:
          API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - run: cat artifacts/last-run.json >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: last-run
          path: |
            artifacts/last-run.json
            run.log
