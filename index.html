<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OptiBot Support</title><style>body{font-family:system-ui,sans-serif;background:#f4f7fb;color:#172033;margin:0}main{max-width:760px;margin:8vh auto;padding:28px;background:white;border-radius:18px;box-shadow:0 12px 40px #17203318}h1{margin-top:0}p{color:#5c667a}textarea{width:100%;box-sizing:border-box;min-height:100px;padding:14px;border:1px solid #ccd4e0;border-radius:10px;font:inherit}button{margin-top:12px;background:#2563eb;color:white;border:0;border-radius:9px;padding:12px 20px;font-weight:600;cursor:pointer}.answer{margin-top:24px;padding:20px;background:#f8fafc;border-radius:12px;line-height:1.55}.answer h1,.answer h2,.answer h3{margin:14px 0 6px}.answer ul{padding-left:22px}.sources{margin-top:18px}.sources a{display:block;margin:8px 0;color:#2563eb;overflow-wrap:anywhere}.error{color:#b42318;margin-top:18px}</style></head><body><main><h1>OptiBot Support</h1><p>Ask a question about OptiSigns. Answers come from the support articles.</p><form id="form"><textarea id="question" placeholder="How do I add a YouTube video?" required></textarea><button>Ask OptiBot</button></form><div id="result"></div></main><script>const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');const md=s=>esc(s).replace(/^### (.*)$/gm,'<h3>$1</h3>').replace(/^## (.*)$/gm,'<h2>$1</h2>').replace(/^# (.*)$/gm,'<h1>$1</h1>').replace(/^[-*] (.*)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\[(.*?)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank" rel="noreferrer">$1</a>').replace(/\n/g,'<br>');form.onsubmit=async e=>{e.preventDefault();result.innerHTML='<p>Looking through the support articles...</p>';const r=await fetch('/api/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:question.value})});const d=await r.json();if(!r.ok){result.innerHTML='<p class="error">'+esc(d.error)+'</p>';return}result.innerHTML='<div class="answer">'+md(d.answer)+'</div><div class="sources"><strong>Sources</strong>'+d.sources.map(u=>'<a href="'+u+'" target="_blank" rel="noreferrer">'+u+'</a>').join('')+'</div>'}</script></body></html>
